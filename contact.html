<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">
        <img src="logo.png" alt="Sacramento Helvetia Verein">
      </div>

      <nav id="nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li class="dropdown">
            <a href="about.html">About</a>
            <ul class="dropdown-menu">
              <li><a href="about.html#history">History</a></li>
              <li><a href="about.html#board">Board</a></li>

      </nav>

      <div class="mobile-toggle" id="mobileToggle">☰</div>

  <section class="page-hero">
    <div class="page-hero-overlay">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you.</p>
    </div>
  </section>

  <section class="page-section">
    <div class="content-container">
      <div class="contact-layout">
        <div class="contact-info">
          <h2>Get in Touch</h2>
          <p><strong>Email:</strong> info@example.com</p>
          <p><strong>Phone:</strong> (555) 555-5555</p>
          <p><strong>Location:</strong> Sacramento, California</p>
        </div>

        <form class="contact-form">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <textarea placeholder="Your Message" rows="6" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Sacramento Helvetia Verein</p>
  </footer>
